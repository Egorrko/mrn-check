name: Monitor Script Updates
on:
  schedule:
    - cron: '*/15 * * * *' 
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Download script
        run: curl -s https://ru.mrrnk.com/script/itd.user.js -o latest_script.js
      - name: Commit and push if changed
        run: |
          git config user.name "Version Monitor"
          git config user.email "monitor@example.com"
          git add latest_script.js
          git diff --quiet && git diff --staged --quiet || (git commit -m "Script updated: $(date)" && git push)
